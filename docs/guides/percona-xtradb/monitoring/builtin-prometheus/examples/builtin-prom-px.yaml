apiVersion: kubedb.com/v1
kind: PerconaXtraDB
metadata:
  name: builtin-prom-px
  namespace: demo
spec:
  version: "8.4.3"
  deletionPolicy: WipeOut
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  monitor:
    agent: prometheus.io/builtin