apiVersion: kubedb.com/v1
kind: PerconaXtraDB
metadata:
  name: script-pxc
  namespace: demo
spec:
  version: "8.4.3"
  replicas: 3
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  init:
    script:
      configMap:
        name: pxc-init-script
  deletionPolicy: WipeOut
