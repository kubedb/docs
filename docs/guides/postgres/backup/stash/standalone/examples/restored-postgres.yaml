apiVersion: kubedb.com/v1
kind: Postgres
metadata:
  name: restored-postgres
  namespace: demo
spec:
  version: "18.3"
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  init:
    waitForInitialRestore: true
  deletionPolicy: Delete
