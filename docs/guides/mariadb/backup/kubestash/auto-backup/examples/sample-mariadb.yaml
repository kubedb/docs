apiVersion: kubedb.com/v1
kind: MariaDB
metadata:
  name: sample-mariadb
  namespace: demo
  annotations:
    blueprint.kubestash.com/name: mariadb-default-backup-blueprint
    blueprint.kubestash.com/namespace: demo
spec:
  version: 12.3.2
  replicas: 3
  storageType: Durable
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  deletionPolicy: WipeOut