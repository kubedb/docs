apiVersion: kubedb.com/v1
kind: MariaDB
metadata:
  name: another-mariadb
  namespace: demo
spec:
  version: "12.3.2"
  storageType: Durable
  podTemplate:
    spec:
      serviceAccountName: md-custom-serviceaccount
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  deletionPolicy: WipeOut