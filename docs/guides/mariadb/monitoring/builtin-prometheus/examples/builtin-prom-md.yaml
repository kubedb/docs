apiVersion: kubedb.com/v1
kind: MariaDB
metadata:
  name: builtin-prom-md
  namespace: demo
spec:
  version: "12.3.2"
  deletionPolicy: WipeOut
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  monitor:
    agent: prometheus.io/builtin