## Base64 encoded secret values from controller cluster
controllerSecret:
  namespace: <base64-encoded-value>
  endpoint: <base64-encoded-value>
  ca.crt: <base64-encoded-value>
  token: <base64-encoded-value>
cluster:
  name: demo-worker
  endpoint: https://<worker-apiserver-ip>:6443
netop:
  networkInterface: <network-interface>
