apiVersion: kubedb.com/v1
kind: MySQL
metadata:
  name: restored-mysql
  namespace: demo
spec:
  version: "9.6.0"
  replicas: 1
  storageType: Durable
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 50Mi
  init:
    waitForInitialRestore: true
  deletionPolicy: WipeOut