apiVersion: kubedb.com/v1alpha2
kind: Singlestore
metadata:
  name: sdb-quickstart
  namespace: demo
spec:
  version: "8.1.32"
  topology:
    aggregator:
      replicas: 1
      storage:
        storageClassName: "standard"
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    leaf:
      replicas: 2
      storage:
        storageClassName: "standard"
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  licenseSecret:
    name: license-secret
  storageType: Durable
  terminationPolicy: WipeOut