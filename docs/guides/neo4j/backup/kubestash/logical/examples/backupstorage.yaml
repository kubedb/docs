apiVersion: storage.kubestash.com/v1alpha1
kind: BackupStorage
metadata:
  name: s3-storage
  namespace: demo
spec:
  storage:
    provider: s3
    s3:
      bucket: kubestash-qa
      region: us-east-2
      endpoint: https://s3.us-east-2.amazonaws.com
      secretName: s3-secret
      prefix: demo
  usagePolicy:
    allowedNamespaces:
      from: All
  default: false
  deletionPolicy: Delete
