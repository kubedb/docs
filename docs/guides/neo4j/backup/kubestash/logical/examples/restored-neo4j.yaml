apiVersion: kubedb.com/v1alpha2
kind: Neo4j
metadata:
  name: neo4j-restore
  namespace: demo
spec:
  init:
    waitForInitialRestore: true
  version: 2025.11.2
  replicas: 3
  storageType: Durable
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 2Gi
  deletionPolicy: WipeOut
