apiVersion: kubedb.com/v1alpha2
kind: Qdrant
metadata:
  name: qdrant-monitoring
  namespace: demo
spec:
  version: "1.17.0"
  replicas: 3
  storage:
    storageClassName: standard
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  monitor:
    agent: prometheus.io/operator
    prometheus:
      serviceMonitor:
        interval: 10s
        labels:
          release: prometheus
  deletionPolicy: WipeOut
