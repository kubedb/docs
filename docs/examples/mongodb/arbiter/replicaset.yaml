apiVersion: kubedb.com/v1
kind: MongoDB
metadata:
  name: mongo-arb
  namespace: demo
spec:
  version: "8.0.17"
  replicaSet:
    name: "rs0"
  replicas: 2
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 500Mi
  arbiter:
    podTemplate: {}
  deletionPolicy: WipeOut

