apiVersion: kubedb.com/v1
kind: MongoDB
metadata:
  name: mg-grafana-demo
  namespace: demo
spec:
  version: "8.0.17"
  replicas: 3
  replicaSet:
    name: rs0
  deletionPolicy: WipeOut
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  monitor:
    agent: prometheus.io/operator
    prometheus:
      serviceMonitor:
        labels:
          release: prometheus
        interval: 10s
