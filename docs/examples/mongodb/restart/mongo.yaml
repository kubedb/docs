apiVersion: kubedb.com/v1
kind: MongoDB
metadata:
  name: mongo
  namespace: demo
spec:
  version: "8.0.17"
  replicaSet:
    name: "replicaset"
  podTemplate:
    spec:
      containers:
        - name: mongodb
          resources:
            requests:
              cpu: "300m"
              memory: "300Mi"
  replicas: 2
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  deletionPolicy: WipeOut
  arbiter: {}
  hidden:
    replicas: 2
    storage:
      storageClassName: "standard"
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi