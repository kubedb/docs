apiVersion: kubedb.com/v1
kind: MongoDB
metadata:
  name: mgo-misc-config
  namespace: demo
spec:
  version: "8.0.17"
  storageType: "Durable"
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  podTemplate:
    spec:
      containers:
        - name: mongodb
          args:
            - --maxConns=100
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
  deletionPolicy: Halt
