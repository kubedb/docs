apiVersion: kubedb.com/v1
kind: RedisSentinel
metadata:
  name: sen-sample
  namespace: demo
spec:
  version: 8.2.2
  replicas: 3
  storageType: Durable
  storage:
    resources:
      requests:
        storage: 1Gi
    storageClassName: "standard"
    accessModes:
      - ReadWriteOnce
  podTemplate:
    spec:
      containers:
        - name: redissentinel
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
  deletionPolicy: DoNotTerminate
