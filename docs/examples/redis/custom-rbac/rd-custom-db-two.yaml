apiVersion: kubedb.com/v1
kind: Redis
metadata:
  name: minute-redis
  namespace: demo
spec:
  version: 8.2.2
  podTemplate:
    spec:
      serviceAccountName: my-custom-serviceaccount
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  deletionPolicy: DoNotTerminate
