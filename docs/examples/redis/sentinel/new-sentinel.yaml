apiVersion: kubedb.com/v1
kind: RedisSentinel
metadata:
  name: new-sentinel
  namespace: demo
spec:
  version: 8.2.2
  replicas: 3
  storageType: Durable
  storage:
    resources:
      requests:
        storage: 1Gi
    storageClassName: "standard"
    accessModes:
      - ReadWriteOnce
  deletionPolicy: WipeOut
