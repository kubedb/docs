apiVersion: kubedb.com/v1
kind: Redis
metadata:
  name: builtin-prom-redis
  namespace: demo
spec:
  version: 8.2.2
  deletionPolicy: WipeOut
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  monitor:
    agent: prometheus.io/builtin
