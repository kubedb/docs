apiVersion: kubedb.com/v1
kind: Redis
metadata:
  name: rd-standalone
  namespace: demo
spec:
  version: "8.2.2"
  storageType: Durable
  storage:
    resources:
      requests:
        storage: 1Gi
  podTemplate:
    spec:
      containers:
        - name: redis
          resources:
            requests:
              cpu: "200m"
              memory: "300Mi"
            limits:
              cpu: "200m"
              memory: "300Mi"
  deletionPolicy: WipeOut
