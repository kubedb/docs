apiVersion: kubedb.com/v1alpha2
kind: Oracle
metadata:
  name: dg-tls
  namespace: demo
spec:
  podTemplate:
    spec:
      imagePullSecrets:
        - name: orclcred
  version: "21.3.0"            
  edition: enterprise       
  mode: DataGuard          
  storageType: Durable
  tcpsConfig:
    tls:
      issuerRef:
        apiGroup: cert-manager.io
        name: oracle-ca-issuer
        kind: Issuer
    tcpsListener:
      port: 2484
  replicas: 3
  storage:
    storageClassName: "local-path"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
  deletionPolicy: WipeOut
