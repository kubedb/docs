apiVersion: kubedb.com/v1alpha2
kind: Oracle
metadata:
  name: init-config
  namespace: demo
spec:
  version: "21.3.0"
  edition: enterprise
  mode: Standalone
  storageType: Durable
  replicas: 1

  storage:
    storageClassName: "local-path"
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi

  podTemplate:
    spec:
      imagePullSecrets:
        - name: orclcred

  init:
    script:
      configMap:
        name: oracle-init-script

  deletionPolicy: WipeOut