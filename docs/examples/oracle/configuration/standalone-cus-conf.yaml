apiVersion: kubedb.com/v1alpha2
kind: Oracle
metadata:
  name: standalone-cus-conf
  namespace: demo
spec:
  configuration:
    secretName: oracle-custom-config
  podTemplate:
    spec:
      imagePullSecrets:
        - name: orclcred
  version: "21.3.0"
  edition: enterprise
  mode: Standalone
  storageType: Durable
  replicas: 1
  storage:
    storageClassName: "local-path"
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi

  deletionPolicy: WipeOut
