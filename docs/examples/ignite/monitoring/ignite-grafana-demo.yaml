apiVersion: kubedb.com/v1alpha2
kind: Ignite
metadata:
  name: ignite-grafana-demo
  namespace: demo
spec:
  version: "2.17.0"
  replicas: 3
  deletionPolicy: WipeOut
  podTemplate:
    spec:
      containers:
      - name: ignite
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
  monitor:
    agent: prometheus.io/operator
    prometheus:
      serviceMonitor:
        labels:
          release: prometheus
        interval: 10s
