apiVersion: kubedb.com/v1
kind: PgBouncer
metadata:
  name: script-pgbouncer
  namespace: demo
spec:
  version: "1.24.0"
  replicas: 1
  database:
    syncUsers: true
    databaseName: "postgres"
    databaseRef:
      name: "quick-postgres"
      namespace: demo
  connectionPool:
    maxClientConnections: 20
    reservePoolSize: 5
  init:
    script:
      configMap:
        name: pb-init-script
  deletionPolicy: WipeOut