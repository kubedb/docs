apiVersion: kubedb.com/v1
kind: PgBouncer
metadata:
  name: builtin-prom-pb
  namespace: demo
spec:
  replicas: 1
  version: "1.24.0"
  database:
    syncUsers: true
    databaseName: "postgres"
    databaseRef:
      name: "ha-postgres"
      namespace: demo
  connectionPool:
    poolMode: session
    port: 5432
  monitor:
    agent: prometheus.io/builtin
