apiVersion: kubedb.com/v1
kind: Postgres
metadata:
  name: pg-ha-tuning
  namespace: demo
spec:
  version: "18.3"
  replicas: 3
  configuration:
    tuning:
      profile: web
      maxConnections: 200
      storageType: ssd
  podTemplate:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            cpu: 2
            memory: 2Gi
          limits:
            memory: 3Gi
  storageType: Durable
  storage:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 3Gi
  deletionPolicy: WipeOut
