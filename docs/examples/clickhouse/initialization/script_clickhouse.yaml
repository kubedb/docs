apiVersion: kubedb.com/v1alpha2
kind: ClickHouse
metadata:
  name: script-clickhouse
  namespace: demo
spec:
  version: "24.4.1"
  storageType: Durable
  storage:
    storageClassName: "standard"
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
  init:
    script:
      configMap:
        name: ch-init-script
  deletionPolicy: WipeOut