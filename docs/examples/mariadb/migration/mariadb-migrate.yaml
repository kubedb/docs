apiVersion: courier.kubedb.com/v1alpha1
kind: MariaDBMigration
metadata:
  name: mariadb-migrate
  namespace: demo
spec:
  source:
    connectionInfo:
      appBinding:
        name: source-mariadb
        namespace: demo
      dbName: "mysql"
      maxConnections: 100
    schema:
      enabled: true
      database:
        - shop
      excludeDatabase: []
    snapshot:
      enabled: true
      pipeline:
        workers: 3
        sinkers: 4
        buffer: 12
        write_batch_size: 200
        read_batch_size: 1000
    streaming:
      enabled: true

  target:
    connectionInfo:
      appBinding:
        name: target-mariadb
        namespace: demo
      dbName: "mysql"
      maxConnections: 100
